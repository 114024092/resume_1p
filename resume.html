<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 劉佩函</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC", sans-serif;
    background:#f5f5f5;
    color:#333;
}

.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns: 300px 1fr;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 左側 */
.sidebar{
    background:#f8c8dc;
    padding:30px 20px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
}

/* 右側 */
.main{
    padding:30px;
}

.block{
    margin-bottom:30px;
}

.block h2{
    border-left:6px solid #f8c8dc;
    padding-left:10px;
}

/* 按鈕 */
.button{
    background:#ff6f91;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

/* 🎵 音樂按鈕（保證顯示） */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
    background:#ff6f91;
    color:white;
    border:none;
    border-radius:50%;
    width:55px;
    height:55px;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- 🎧 音樂 -->
<audio id="bgm" loop>
    <source src="001.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 按鈕（一定會看到） -->
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<div class="container">

    <div class="sidebar">
        <img src="images/17.jpg">
        <h1>劉佩函</h1>
        <p>資訊傳播學系</p>
    </div>

    <div class="main">
        <div class="block">
            <h2>關於我</h2>
            <p>喜歡攝影與設計，擅長簡約與日系風格。</p>
        </div>

        <div class="block">
            <h2>互動</h2>
            <button class="button" onclick="showContact()">顯示聯絡方式</button>
            <p id="contact"></p>
        </div>
    </div>

</div>

<script>
// 🎧 點擊任意地方自動播放（解決瀏覽器限制）
document.body.addEventListener("click", () => {
    const audio = document.getElementById("bgm");
    audio.play();
}, { once: true });

// 🎵 按鈕控制
function toggleMusic(){
    const audio = document.getElementById("bgm");
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

// 聯絡資訊
function showContact(){
    document.getElementById("contact").innerHTML =
    "Email：114024092@live.asia.edu.tw";
}
</script>

</body>
</html>
