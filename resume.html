<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 劉佩函</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC", sans-serif;
    background:#f5f5f5;
    color:#333;
}

.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns: 300px 1fr;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 左側 */
.sidebar{
    background:#f8c8dc;
    padding:30px 20px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
}

.sidebar h1{
    margin:15px 0 5px;
}

.sidebar p{
    font-size:14px;
}

.section{
    margin-top:30px;
    text-align:left;
}

.section h3{
    border-bottom:2px solid white;
    padding-bottom:5px;
}

.skill{
    background:white;
    display:inline-block;
    padding:5px 10px;
    border-radius:5px;
    margin:5px 3px;
    font-size:13px;
}

/* 右側 */
.main{
    padding:30px;
}

.block{
    margin-bottom:30px;
}

.block h2{
    border-left:6px solid #f8c8dc;
    padding-left:10px;
}

ul{
    padding-left:20px;
}

.timeline{
    border-left:2px solid #ddd;
    padding-left:15px;
}

.timeline div{
    margin-bottom:15px;
}

.button{
    background:#ff6f91;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.button:hover{
    opacity:0.8;
}
</style>
</head>

<body>
<audio autoplay loop>
    <source src="audio/m2.mp3" type="audio/mpeg">
    您的瀏覽器不支援音樂播放
</audio>
<div class="container">

    <!-- 左欄 -->
    <div class="sidebar">
        <img src="images/photo.jpg">
        <h1>劉佩函</h1>
        <p>視覺傳達設計</p>

        <div class="section">
            <h3>聯絡</h3>
            <p>your@email.com</p>
            <p>@your_account</p>
        </div>

        <div class="section">
            <h3>技能</h3>
            <span class="skill">Photoshop</span>
            <span class="skill">Illustrator</span>
            <span class="skill">Figma</span>
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
        </div>
    </div>

    <!-- 右欄 -->
    <div class="main">

        <div class="block">
            <h2>關於我</h2>
            <p>
            我是亞洲大學資訊傳播學系學生，專長於平面設計與品牌視覺。
            風格偏向日系柔和設計，擅長簡約排版與包裝設計。
            </p>
        </div>

        <div class="block">
            <h2>學歷</h2>
            <div class="timeline">
                <div>
                    <strong>亞洲大學</strong><br>
                    資訊傳播學系
                </div>
            </div>
        </div>

        <div class="block">
            <h2>作品方向</h2>
            <ul>
                <li>品牌視覺設計</li>
                <li>包裝設計</li>
                <li>社群視覺</li>
                <li>網站設計</li>
            </ul>
        </div>

        <div class="block">
            <h2>互動</h2>
            <button class="button" onclick="showContact()">顯示聯絡方式</button>
            <p id="contact"></p>
        </div>

    </div>

</div>

<script>
function showContact(){
    document.getElementById("contact").innerHTML = 
    "Email：your@email.com<br>Instagram：@your_account";
}
</script>

</body>
</html>
