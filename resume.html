<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 劉佩函</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC", sans-serif;
    background:linear-gradient(135deg,#ffe4ec,#f5f5f5);
    color:#333;
}

/* ✨ 淡入動畫 */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns: 300px 1fr;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    animation:fadeIn 1s ease;
}

/* 左側 */
.sidebar{
    background:#ffc1d6;
    padding:30px 20px;
    text-align:center;
}

.sidebar img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    transition:0.3s;
}

.sidebar img:hover{
    transform:scale(1.05);
}

.sidebar h1{
    margin:15px 0 5px;
}

/* 右側 */
.main{
    padding:30px;
}

/* 卡片感 */
.block{
    margin-bottom:25px;
    padding:20px;
    border-radius:15px;
    background:#fff0f5;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    transition:0.3s;
}

.block:hover{
    transform:translateY(-5px);
}

.block h2{
    margin-top:0;
    color:#ff6f91;
}

/* 按鈕 */
.button{
    background:#ff6f91;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.button:hover{
    background:#ff3f6c;
}

/* 🎵 音樂按鈕 */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
    background:#ff6f91;
    color:white;
    border:none;
    border-radius:50%;
    width:60px;
    height:60px;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* 🎵 旋轉動畫 */
@keyframes spin{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

.playing{
    animation:spin 3s linear infinite;
}
</style>
</head>

<body>

<!-- 音樂 -->
<audio id="bgm" loop>
    <source src="audio/001.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="container">

    <div class="sidebar">
        <img src="images/17.jpg">
        <h1>劉佩函</h1>
        <p>114024092 資訊傳播學系</p>

        <div class="section">
            <h3>聯絡</h3>
            <p>Email：114024092@live.asia.edu.tw</p>
            <p>興趣：購物、散步、攝影</p>
        </div>

        <div class="section">
            <h3>技能</h3>
            <span class="skill">Photoshop</span>
            <span class="skill">Illustrator</span>
            <span class="skill">Figma</span>
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
        </div>
    </div>


    <div class="main">

        <div class="block">
            <h2>關於我</h2>
            <p>
            我是亞洲大學資訊傳播學系學生，興趣是攝影、追劇、追星與遛我家狗狗。 個性溫和細心，擅長簡約風格與日系設計。
            </p>
        </div>

        <div class="block">
            <h2>作品方向</h2>
            <ul>
                <li>品牌視覺設計</li>
                <li>海報設計</li>
                <li>社群視覺</li>
                <li>網站設計</li>
            </ul>
        </div>

        <div class="block">
            <h2>互動</h2>
            <button class="button" onclick="showContact()">顯示聯絡方式</button>
            <p id="contact"></p>
        </div>

    </div>

</div>

<script>
// 點擊任意地方播放
document.body.addEventListener("click", () => {
    const audio = document.getElementById("bgm");
    audio.play();
}, { once: true });

// 音樂控制 + 動畫
function toggleMusic(){
    const audio = document.getElementById("bgm");
    const btn = document.getElementById("musicBtn");

    if(audio.paused){
        audio.play();
        btn.classList.add("playing");
    }else{
        audio.pause();
        btn.classList.remove("playing");
    }
}

// 聯絡資訊
function showContact(){
    document.getElementById("contact").innerHTML =
    "Email：114024092@live.asia.edu.tw<br>Instagram：@your_account";
}
</script>

</body>
</html>
