<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 劉佩函</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#f7f7f7;
    color:#333;
}

/* Header */
header{
    background:#ffb6c1;
    color:white;
    text-align:center;
    padding:30px 20px;
}

/* 個人照片 */
header img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    margin-bottom:10px;
}

/* 區塊 */
section{
    max-width:900px;
    margin:auto;
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h2{
    border-bottom:2px solid #ffb6c1;
    padding-bottom:5px;
}

/* 基本資料 */
.info{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.info div{
    flex:1 1 200px;
}

/* 技能標籤 */
.skill{
    background:#ffe4ec;
    padding:6px 10px;
    border-radius:6px;
    display:inline-block;
    margin:4px;
}

/* 按鈕 */
button{
    background:#ff6f91;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<header>
<img src="images/photo.jpg" alt="個人照片">
<h1>劉佩函</h1>
<p>亞洲大學 資訊傳播學系 學生</p>
</header>

<section>
<h2>基本資料</h2>
<div class="info">
<div><strong>學號：</strong>114024092</div>
<div><strong>學校：</strong>亞洲大學</div>
<div><strong>科系：</strong>資訊傳播學系</div>
</div>
</section>

<section>
<h2>個人簡介</h2>
<p>
我是亞洲大學資訊傳播學系的學生，專注於視覺設計與數位媒體創作。
擅長平面設計、簡約風格排版與品牌視覺規劃，喜歡將創意與設計結合，
創造具有美感與溝通力的作品。
</p>
</section>

<section>
<h2>技能</h2>
<span class="skill">Photoshop</span>
<span class="skill">Illustrator</span>
<span class="skill">Figma</span>
<span class="skill">HTML</span>
<span class="skill">CSS</span>
<span class="skill">JavaScript</span>
</section>

<section>
<h2>作品方向</h2>
<ul>
<li>品牌視覺設計</li>
<li>包裝設計</li>
<li>社群媒體視覺</li>
<li>網站版面設計</li>
</ul>
</section>

<section>
<h2>互動</h2>
<p>點擊按鈕顯示聯絡資訊</p>
<button onclick="showContact()">顯示聯絡方式</button>
<p id="contact"></p>
</section>

<script>
function showContact(){
    document.getElementById("contact").innerHTML = 
    "Email：your@email.com<br>Instagram：@your_account";
}
</script>

</body>
</html>
